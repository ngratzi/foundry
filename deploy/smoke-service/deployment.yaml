apiVersion: apps/v1
kind: Deployment
metadata:
  name: smoke-service
  namespace: foundry
spec:
  replicas: 1
  selector:
    matchLabels:
      app: smoke-service
  template:
    metadata:
      labels:
        app: smoke-service
    spec:
      containers:
        - name: smoke-service
          image: ghcr.io/ngratzi/smoke-service:1.0.0
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: smoke-service
  namespace: foundry
spec:
  selector:
    app: smoke-service
  ports:
    - port: 80
      targetPort: 3000
