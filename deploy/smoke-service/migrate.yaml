apiVersion: batch/v1
kind: Job
metadata:
  name: smoke-service-migrate
  namespace: foundry
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: liquibase
          image: liquibase/liquibase:4.27
          args:
            - --searchPath=/changelog
            - --url=jdbc:postgresql://postgres-postgresql.foundry.svc.cluster.local:5432/foundry
            - --username=foundry
            - --password=$(DB_PASSWORD)
            - --changeLogFile=db.changelog-master.xml
            - update
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: password
          volumeMounts:
            - name: changelog
              mountPath: /changelog/changes
            - name: changelog
              mountPath: /changelog/db.changelog-master.xml
              subPath: db.changelog-master.xml
      volumes:
        - name: changelog
          configMap:
            name: smoke-changelog
